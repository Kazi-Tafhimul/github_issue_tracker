    <section class="nav-section flex flex-col items-center md:flex-row justify-between">
        <div class="flex flex-col md:flex-row gap-1 px-6 py-2 items-center">
            <img class="w-8" src="assets/github-logo.png" alt="">
            <h1 class="font-bold text-xl">Github Issues Tracker</h1>
        </div>
        <div class="flex flex-col items-center md:flex-row gap-2 pr-6">
            <div class="search-box  py-2">
                <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="search-input" oninput="searchIssues()" type="search" required placeholder="Search" />
                        </label>
            </div>
            <div class="py-2">
                <button class="btn btn-primary"> <i class="fa-solid fa-plus"></i> New Issues</button>
            </div>
        </div>

    </section>
    <section class="body bg-[#F8FAFC] flex flex-col justify-center items-center">
        <div class="bg-white w-[80%] flex flex-row justify-start gap-4 mx-auto mt-6 mb-2 p-5 rounded shadow-sm">
           <button id="btn-all" onclick="filterIssues('all')" class="btn btn-primary filter-btn">All</button>
           <button id="btn-open" onclick="filterIssues('open')" class="btn filter-btn">Open</button>
           <button id="btn-closed" onclick="filterIssues('closed')" class="btn filter-btn">Closed</button>

        </div>
        <div class="bg-white w-[80%] flex flex-row justify-between mt-1 p-5 rounded shadow-sm">
            <div class="flex flex-row items-center gap-1">
                <img src="assets/Aperture.png" alt="">
                <div class="flex flex-col justify-center">
                    <p id="issues-count" class="font-semibold text-xl"></p>
                    <p class="font-normal text-gray-500">Track and manage your project issues</p>
                </div>



            </div>
            <div class="flex flex-row gap-4">
                <span class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-600"></div>
                    Open

                </span>
                 <span class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-violet-600"></div>
                    Closed

                </span>


            </div>

        </div>
        <div id="loader" class="hidden flex justify-center items-center py-20">
            <span class="loading loading-infinity loading-xl"></span>
        </div>
        <div id="card-container" class="bg-[#F8FAFC] grid grid-cols-2 md:grid-cols-4 w-[80%] py-4 px-2 gap-1 rounded shadow-sm">

<!-- Modal -->
 

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box max-w-2xl">
    <h3 id="modal-title" class="text-2xl font-bold text-slate-800 mb-2"></h3>
    
    <div class="flex items-center gap-3 text-sm text-gray-500 mb-6">
        <span id="modal-status" class="px-3 py-1 rounded-full text-white font-medium text-xs"></span>
        <span>•</span>
        <span id="modal-author"></span>
        <span>•</span>
        <span id="modal-date"></span>
    </div>

    <div id="modal-labels" class="flex flex-wrap gap-2 mb-6"></div>

    <p id="modal-description" class="text-gray-600 leading-relaxed mb-8"></p>

    <div class="bg-slate-50 rounded-xl p-5 flex justify-between items-center mb-6">
        <div>
            <p class="text-xs text-gray-400 uppercase font-bold mb-1">Assignee:</p>
            <p id="modal-assignee" class="font-bold text-slate-800"></p>
        </div>
        <div class="text-right">
            <p class="text-[12px] text-gray-400 uppercase font-bold mb-1">Priority:</p>
            <span id="modal-priority" class="px-4 py-1 rounded-full text-white font-bold text-[12px] uppercase"></span>
        </div>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary bg-indigo-600 border-none px-8">Close</button>
      </form>
    </div>
  </div>
</dialog>
