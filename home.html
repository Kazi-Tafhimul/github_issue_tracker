<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Github issue tracker</title>
    <!-- Daisyui + tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- css -->
 <link rel="stylesheet" href="style.css">
 <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <section class="nav-section flex flex-col items-center md:flex-row justify-between">
        <div class="flex flex-col md:flex-row gap-1 px-6 py-2 items-center">
            <img class="w-8" src="assets/github-logo.png" alt="">
            <h1 class="font-bold text-xl">Github Issues Tracker</h1>
        </div>
        <div class="flex flex-col items-center md:flex-row gap-2 pr-6">
            <div class="search-box  py-2">
                <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                            >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search" />
                        </label>
            </div>
            <div class="py-2">
                <button class="btn btn-primary"> <i class="fa-solid fa-plus"></i> New Issues</button>
            </div>
        </div>

    </section>
    <section class="body bg-[#F8FAFC] flex flex-col justify-center items-center">
        <div class="bg-white w-[80%] flex flex-row justify-start gap-4 mx-auto mt-6 mb-2 p-5 rounded shadow-sm">
           <button class="btn btn-primary">All</button>
           <button class="btn">Open</button>
           <button class="btn">Closed</button>

        </div>
        <div class="bg-white w-[80%] flex flex-row justify-between mt-1 p-5 rounded shadow-sm">
            <div class="flex flex-row items-center gap-1">
                <img src="assets/Aperture.png" alt="">
                <div class="flex flex-col justify-center">
                    <p class="font-semibold text-xl">50 Issues</p>
                    <p class="font-normal text-gray-500">Track and manage your project issues</p>
                </div>



            </div>
            <div class="flex flex-row gap-4">
                <span class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-600"></div>
                    Open

                </span>
                 <span class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-violet-600"></div>
                    Closed

                </span>


            </div>

        </div>


       

      
    </section>

</body>
</html>
