<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Github issue tracker</title>
    <!-- Daisyui + tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- css -->
 <link rel="stylesheet" href="style.css">

</head>
<body>
    <section class="login-form flex justify-center items-center min-h-screen space-y-5 ">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-sm border p-4">
            <div class="flex justify-center items-center flex-col space-y-2">
                <img src="assets/github-logo.png" alt="">
                <h1 class="font-bold text-2xl">Github Issues Tracker</h1>
                <h6 class="font-normal text-[16px] text-gray-400">Sign in to manage your issues</h6>
            </div>
  <!-- <legend class="fieldset-legend">Login</legend> -->

  <label class="label">Username</label>
  <input type="text" id="input-name" class="input" placeholder="Enter user name" />
  <h6 class="text-violet-700">Default:admin</h6>

  <label class="label">Password</label>
  <input type="password" id="input-password" class="input" placeholder="Enter password" />
  <h6 class="text-violet-700">Default:admin123</h6>

  <button id="sign-in-btn" class=" btn btn-primary mt-4 rounded-xl">Sign in</button>
  <div class="flex w-full flex-col">
  
  <div class="divider">OR</div>
  <div class="bg-white flex flex-col justify-center items-center">
    <h1 class="font-normal text-[16px] text-gray-600 mb-5">Demo Credentials:</h1>
    <div>
        <p class="font-normal"><span class="font-bold">Username:</span>admin</p>
        <p class="font-normal"><span class="font-bold">Password:</span>admin123</p>
    </div>


  </div>
</div>
</fieldset>
        
    </section>
    <script src="script/login.js"></script>
    <script src="script/function.js"></script>
    
</body>
</html>
